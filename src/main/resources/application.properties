# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/employee_management?useSSL=false}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:8080}

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:myTempSecret123}
jwt.expiration=86400000

# ===============================
# MAIL CONFIG
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:test@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:testpass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=${FILE_UPLOAD_DIR:uploads}

# ===============================
# GROQ API (AI Chatbot)
# ===============================
groq.api.key=${GROQ_API_KEY:dummyKey}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

# ===============================
# FRONTEND URL (for email links)
# ===============================
app.frontend.url=${FRONTEND_URL:http://localhost:5500}